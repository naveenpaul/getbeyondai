services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: getbeyond
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d getbeyond"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/getbeyond-blobs &&
      mc anonymous set download local/getbeyond-blobs &&
      exit 0
      "

  # Opt-in content extractor for fetch_url (CONTENT_PROVIDER=crawl4ai).
  # Behind the `crawl4ai` profile so the default `docker compose up` does NOT
  # pull this ~1GB Chromium image — start it explicitly when you want
  # browser-rendered markdown instead of the zero-dependency local extractor:
  #   docker compose --profile crawl4ai up -d crawl4ai
  # Then set in the API env: CONTENT_PROVIDER=crawl4ai, CRAWL4AI_URL=http://localhost:11235
  crawl4ai:
    image: unclecode/crawl4ai:0.7.7 # pin the tag — never :latest in a shipped product
    profiles: ["crawl4ai"]
    restart: unless-stopped
    shm_size: 1g # REQUIRED: Chromium needs shared memory or it crashes under load
    environment:
      # Optional bearer token gating the API. Leave unset for local dev.
      CRAWL4AI_API_TOKEN: ${CRAWL4AI_API_TOKEN:-}
    ports:
      - "11235:11235" # published on localhost for the host-run API (like postgres/minio)
    healthcheck:
      # The image is Python-based (no guaranteed curl); use urllib instead.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:11235/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

# api/web/worker services land in Phase B once the apps are scaffolded.

volumes:
  postgres-data:
  minio-data:
