services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: getbeyond
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d getbeyond"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/getbeyond-blobs &&
      mc anonymous set download local/getbeyond-blobs &&
      exit 0
      "

  # Keyless browser-rendered content extractor for fetch_url + discovery list-
  # page mining. Behind the `crawl4ai` profile so a plain `docker compose up`
  # does NOT pull this ~1GB Chromium image — the zero-dependency `local`
  # extractor stays the no-sidecar default. `./dev.sh` starts it and exports
  # CRAWL4AI_URL, so the content registry auto-resolves `crawl4ai` with no .env
  # edit (just like SearXNG). To run it by hand:
  #   docker compose --profile crawl4ai up -d crawl4ai
  # then export CRAWL4AI_URL=http://localhost:11235 (the registry infers the rest).
  crawl4ai:
    image: unclecode/crawl4ai:0.7.7 # pin the tag — never :latest in a shipped product
    profiles: ["crawl4ai"]
    restart: unless-stopped
    shm_size: 1g # REQUIRED: Chromium needs shared memory or it crashes under load
    environment:
      # Optional bearer token gating the API. Leave unset for local dev.
      CRAWL4AI_API_TOKEN: ${CRAWL4AI_API_TOKEN:-}
    ports:
      - "11235:11235" # published on localhost for the host-run API (like postgres/minio)
    healthcheck:
      # The image is Python-based (no guaranteed curl); use urllib instead.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:11235/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Opt-in keyless web-search backend for the web_search tool
  # (SEARCH_PROVIDER=searxng). Behind the `searxng` profile so the default
  # `docker compose up` does NOT start it — bring it up explicitly when you want
  # keyless, self-hosted search instead of the Brave API:
  #   docker compose --profile searxng up -d searxng
  # Then set in the API env: SEARCH_PROVIDER=searxng, SEARXNG_URL=http://localhost:8080
  # Config (JSON API enabled + bot-limiter off) lives in ./searxng/settings.yml.
  searxng:
    image: searxng/searxng:latest # upstream's recommended tag for the dev sidecar; pin a date tag for reproducibility
    profiles: ["searxng"]
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng:rw # provides settings.yml (json format + limiter off)
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
    ports:
      - "8080:8080" # published on localhost for the host-run API (like postgres/minio)
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

# api/web/worker services land in Phase B once the apps are scaffolded.

volumes:
  postgres-data:
  minio-data:
